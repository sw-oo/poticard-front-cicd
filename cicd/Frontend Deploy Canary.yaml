apiVersion: apps/v1
kind: Deployment
metadata:
  name: poticard-frontend-canary
  labels:
    type: frontend
    version: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      type: frontend
      version: canary
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        type: frontend
        version: canary
    spec:
      containers:
      - name: frontend
        image: tahcy/potifront:0.2
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"